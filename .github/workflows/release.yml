name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - "main"
      - "master"

concurrency:
  group: release-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.5"

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semantic.outputs.new_release_version }}
      released: ${{ steps.semantic.outputs.new_release_published }}
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          semantic_version: 23.0.7
          branches: |
            [
              'master',
              'main',
              'develop'
            ]
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@7.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute release metadata
        id: meta
        run: |
          if [ "${{ steps.semantic.outputs.new_release_published }}" = "true" ]; then
            echo "tag=v${{ steps.semantic.outputs.new_release_version }}" >> "$GITHUB_OUTPUT"
            if [[ "${{ steps.semantic.outputs.new_release_version }}" == *"-"* ]]; then
              echo "prerelease=true" >> "$GITHUB_OUTPUT"
            else
              echo "prerelease=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Debug - Check created tags
        run: |
          echo "Latest tags:"
          git tag -l --sort=-version:refname | head -10
          echo ""
          echo "Semantic release outputs:"
          echo "  new_release_published: ${{ steps.semantic.outputs.new_release_published }}"
          echo "  new_release_version: ${{ steps.semantic.outputs.new_release_version }}"
          echo ""
          echo "Recent commits:"
          git log --oneline -5

      - name: Display release summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "=========================================="
          echo "Release Summary"
          echo "=========================================="
          echo ""
          echo "✓ Version: ${{ steps.semantic.outputs.new_release_version }}"
          echo "✓ Tag: v${{ steps.semantic.outputs.new_release_version }}"
          echo "✓ Channel: ${{ steps.semantic.outputs.new_release_channel }}"
          echo ""
          echo "GitHub Release Details:"
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Commit: ${{ github.event.workflow_run.head_sha }}"
          echo ""
          echo "=========================================="

      - name: No new release
        if: steps.semantic.outputs.new_release_published != 'true'
        run: |
          echo "No new version to release."
          echo "Use conventional commits to trigger a new release:"
          echo "  - feat: ... (releases MINOR)"
          echo "  - fix: ... (releases PATCH)"
          echo "  - BREAKING CHANGE: ... (releases MAJOR)"

  release-web:
    name: Release Web Editor
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages first
        run: pnpm turbo build --filter='./packages/*' --filter='./runtimes/*'

      - name: Build web editor
        run: pnpm turbo build --filter='@rive-monorepo/web-editor'
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ needs.release.outputs.tag }}

      - name: Run production smoke tests
        run: pnpm turbo test --filter='@rive-monorepo/web-editor'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-editor-${{ needs.release.outputs.tag }}
          path: apps/web-editor/out

      - name: Deploy to Vercel
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx vercel --prebuilt --token=${{ env.VERCEL_TOKEN }} --prod
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Skip deploy (missing Vercel token)
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "VERCEL_TOKEN is not configured."
          echo "Web build artifact was created, but deployment was skipped."

  release-web-aws:
    name: Release Web Editor (AWS OIDC)
    needs: release
    if: needs.release.outputs.released == 'true' && vars.AWS_REGION != '' && vars.AWS_ECR_REPOSITORY != ''
    runs-on: ubuntu-latest
    env:
      AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials (OIDC)
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' }}
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push web image
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' }}
        id: image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          REPOSITORY: ${{ vars.AWS_ECR_REPOSITORY }}
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          IMAGE_URI="$REGISTRY/$REPOSITORY:$TAG"
          if aws ecr describe-images --repository-name "$REPOSITORY" --image-ids imageTag="$TAG" >/dev/null 2>&1; then
            echo "Image tag $TAG already exists in ECR (immutable). Reusing existing image."
          else
            docker build -f docker/Dockerfile -t "$IMAGE_URI" .
            docker push "$IMAGE_URI"
          fi
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Trigger App Runner deployment
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_APPRUNNER_SERVICE != '' }}
        env:
          SERVICE_NAME: ${{ vars.AWS_APPRUNNER_SERVICE }}
        run: |
          SERVICE_ARN=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceArn | [0]" --output text)
          if [ -z "$SERVICE_ARN" ] || [ "$SERVICE_ARN" = "None" ]; then
            if [ -z "${{ secrets.AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN }}" ]; then
              echo "Missing AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN secret required for first-time service creation."
              exit 1
            fi
            aws apprunner create-service \
              --service-name "$SERVICE_NAME" \
              --source-configuration "ImageRepository={ImageIdentifier=${{ steps.image.outputs.image_uri }},ImageRepositoryType=ECR,ImageConfiguration={Port=80}},AuthenticationConfiguration={AccessRoleArn=${{ secrets.AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN }}},AutoDeploymentsEnabled=true"
          else
            if [ -z "${{ secrets.AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN }}" ]; then
              echo "Missing AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN secret required to pin App Runner to release image tag."
              exit 1
            fi
            aws apprunner update-service \
              --service-arn "$SERVICE_ARN" \
              --source-configuration "ImageRepository={ImageIdentifier=${{ steps.image.outputs.image_uri }},ImageRepositoryType=ECR,ImageConfiguration={Port=80}},AuthenticationConfiguration={AccessRoleArn=${{ secrets.AWS_APPRUNNER_ECR_ACCESS_ROLE_ARN }}},AutoDeploymentsEnabled=true"
          fi

      - name: Publish App Runner URL to summary
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_APPRUNNER_SERVICE != '' }}
        env:
          SERVICE_NAME: ${{ vars.AWS_APPRUNNER_SERVICE }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
        run: |
          SERVICE_URL=$(aws apprunner list-services --query "ServiceSummaryList[?ServiceName=='$SERVICE_NAME'].ServiceUrl | [0]" --output text)
          if [ -n "$SERVICE_URL" ] && [ "$SERVICE_URL" != "None" ]; then
            {
              echo "## AWS Web Deployment"
              echo ""
              echo "- Service: \`$SERVICE_NAME\`"
              echo "- Image: \`$IMAGE_URI\`"
              echo "- URL: https://$SERVICE_URL"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "App URL: https://$SERVICE_URL"
          else
            echo "App Runner service URL not found for $SERVICE_NAME"
          fi

      - name: Skip App Runner deploy
        if: ${{ env.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_APPRUNNER_SERVICE == '' }}
        run: |
          echo "AWS_APPRUNNER_SERVICE variable is not set."
          echo "Image was pushed to ECR; App Runner deployment skipped."

      - name: Skip AWS deploy (missing role ARN secret)
        if: ${{ env.AWS_DEPLOY_ROLE_ARN == '' }}
        run: |
          echo "AWS_DEPLOY_ROLE_ARN secret is not configured."
          echo "AWS OIDC deployment skipped."

  release-desktop:
    name: Release Desktop (${{ matrix.os }})
    needs: release
    if: needs.release.outputs.released == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}
    environment: desktop-release
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      WIN_CERTIFICATE_SUBJECT: ${{ secrets.WIN_CERTIFICATE_SUBJECT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web editor (static export)
        run: pnpm turbo build --filter='@rive-monorepo/web-editor'

      - name: Import macOS signing certificate
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE_BASE64 != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        continue-on-error: true
        env:
          CERTIFICATE_BASE64: ${{ env.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ env.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ env.KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - name: Skip macOS cert import
        if: runner.os == 'macOS' && (env.APPLE_CERTIFICATE_BASE64 == '' || env.APPLE_CERTIFICATE_PASSWORD == '' || env.KEYCHAIN_PASSWORD == '')
        run: |
          echo "macOS signing certificate secrets are not fully configured."
          echo "Continuing with unsigned macOS artifacts."

      - name: Build Electron (${{ matrix.platform }})
        run: pnpm --filter @rive-monorepo/desktop-editor build:${{ matrix.platform }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          WIN_CERTIFICATE_SUBJECT: ${{ secrets.WIN_CERTIFICATE_SUBJECT }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ needs.release.outputs.tag }}
          path: apps/desktop-editor/release/**/*

  publish-desktop-assets:
    name: Publish Desktop Assets
    needs: [release, release-desktop]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: ./release-artifacts

      - name: Attach desktop artifacts to release (with retry/backoff)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.release.outputs.tag }}
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-artifacts -type f | sort)
          for file in "${files[@]}"; do
            echo "Uploading: $file"
            success=0
            for attempt in 1 2 3 4 5; do
              if gh release upload "$TAG_NAME" "$file" --clobber; then
                success=1
                break
              fi
              sleep_seconds=$((attempt * 10))
              echo "Upload failed (attempt $attempt). Sleeping ${sleep_seconds}s before retry..."
              sleep "$sleep_seconds"
            done
            if [ "$success" -ne 1 ]; then
              echo "Failed to upload $file after retries"
              exit 1
            fi
            # Small delay between uploads to avoid GitHub secondary rate limits.
            sleep 2
          done
