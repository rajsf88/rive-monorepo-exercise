name: Nightly

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC = midnight PST
  workflow_dispatch:
    inputs:
      debug:
        type: boolean
        description: "Enable debug logging"
        default: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.5"

jobs:
  full-ci:
    name: Full Nightly CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Full build
        run: pnpm turbo build
      - name: Full test with coverage
        run: pnpm turbo test -- --coverage
      - name: Upload nightly build
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ github.run_number }}
          path: |
            packages/*/dist
            runtimes/*/dist
          retention-days: 14

  golden-tests:
    name: Golden / Snapshot Tests
    runs-on: ubuntu-latest
    needs: full-ci
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: "${{ env.PNPM_VERSION }}" }
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build
      - name: Run golden tests
        run: |
          echo "Running canvas snapshot / golden tests..."
          # In production: compare rendered frames against baseline PNGs
          pnpm --filter '@rive-monorepo/canvas-renderer' vitest run --reporter=verbose

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [full-ci, golden-tests]
    if: failure()
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "⚠️ Nightly build FAILED on `${{ github.ref_name }}`\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
